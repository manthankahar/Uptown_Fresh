<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="form-container">

<h2>Create Account</h2>

<form>

<input
type="text"
placeholder="Full Name"
required
>

<input
type="email"
placeholder="Email"
required
>

<input
type="password"
placeholder="Password"
required
>

<button type="submit">
Signup
</button>

</form>

<p>

Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>
<script src="js/signup.js"></script>
</body>
</html>
