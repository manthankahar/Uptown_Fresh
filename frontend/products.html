<!DOCTYPE html>
<html>
<head>
  <title>Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Products</h1>

<div id="products"></div>

<script>

fetch("http://localhost:5000/api/products")
.then(res=>res.json())
.then(data=>{

  let html="";

  data.forEach(product=>{

    html += `
      <div class="card">
        <img src="${product.image}">
        <h3>${product.name}</h3>
        <p>₹${product.price}</p>

        <button>
          Add To Cart
        </button>
      </div>
    `;

  });

  document.getElementById("products").innerHTML = html;

});

</script>

</body>
</html>
