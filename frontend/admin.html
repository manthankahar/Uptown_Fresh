<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h1>Admin Dashboard</h1>

<form id="productForm">

    <input
      type="text"
      id="name"
      placeholder="Product Name"
      required
    >

    <input
      type="number"
      id="price"
      placeholder="Price"
      required
    >

   <input
  type="file"
  id="image"
  required
>

    <textarea
      id="description"
      placeholder="Description"
      required
    ></textarea>

    <button type="submit">
      Add Product
    </button>

</form>

<script src="js/admin.js"></script>

</body>
</html>
